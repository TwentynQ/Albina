<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Альбина</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Marck+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <h1 class="typewriter" data-text="Привет, Альбина."></h1>
        
        <div class="poem">
            <p class="typewriter" data-text="Сегодня тебе"></p>
            <p class="age typewriter" data-text="35"></p>
            <p class="typewriter" data-text="Красивый возраст."></p>
            <p class="typewriter" data-text="Возраст,"></p>
            <p class="typewriter" data-text="когда уже многое понимаешь."></p>
            <p class="typewriter" data-text="И всё ещё столько всего впереди."></p>
            <br>
            <p class="typewriter" data-text="Сегодня не будет"></p>
            <p class="typewriter" data-text="длинной открытки."></p>
            <br>
            <p class="typewriter" data-text="Иногда одной песни достаточно..."></p>
            <p class="typewriter" data-text="...чтобы сказать больше,"></p>
            <p class="typewriter" data-text="чем целой открыткой."></p>
            <br>
            <p class="typewriter" data-text="Помнишь?"></p>
            <p class="typewriter" data-text="Ты написала мне:"></p>
            <p class="typewriter highlight" data-text="«Божечки!!! Какая песня!!!»"></p>
            <br>
            <p class="typewriter" data-text="Наверное,"></p>
            <p class="typewriter" data-text="некоторые песни становятся больше,"></p>
            <p class="typewriter" data-text="чем просто музыкой."></p>
            <br>
            <p class="typewriter" data-text="Я продолжаю видеть"></p>
            <p class="typewriter" data-text="в ней нас."></p>
            <br>
            <p class="typewriter" data-text="Спасибо."></p>
            <p class="typewriter" data-text="За разговоры."></p>
            <p class="typewriter" data-text="За смех."></p>
            <p class="typewriter" data-text="За моменты,"></p>
            <p class="typewriter" data-text="когда становилось спокойно."></p>
            <p class="typewriter" data-text="За ощущение,"></p>
            <p class="typewriter" data-text="что рядом можно быть настоящим."></p>
            <br>
            <p class="typewriter" data-text="Знаешь..."></p>
            <p class="typewriter" data-text="Если бы у меня была такая кнопка —"></p>
            <p class="typewriter" data-text="Я бы нажимал её"></p>
            <p class="typewriter" data-text="снова и снова."></p>
            <br>
            <p class="typewriter" data-text="Не потому что хочется вернуть время."></p>
            <p class="typewriter" data-text="А потому что некоторые моменты"></p>
            <p class="typewriter" data-text="хочется почувствовать ещё раз."></p>
        </div>

        <div class="button-wrapper">
            <button class="play-button no-select" id="playBtn">▶ Послушать</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="final-message" id="finalMessage">
            <p class="typewriter" data-text="Ты прекрасна."></p>
        </div>

        <div class="button-wrapper">
            <button class="replay-button no-select" id="replayBtn">▶ Прожить сначала</button>
        </div>
    </div>

    <div class="notes" id="notes">
        <span class="note" style="left: 10%; animation-delay: 0s;">♪</span>
        <span class="note" style="left: 30%; animation-delay: 1s;">♫</span>
        <span class="note" style="left: 50%; animation-delay: 2s;">♪</span>
        <span class="note" style="left: 70%; animation-delay: 3s;">♫</span>
        <span class="note" style="left: 90%; animation-delay: 4s;">♪</span>
    </div>

    <audio id="audio" preload="none">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
